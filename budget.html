<!-- budget.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget - MoneTrac</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        
        .budget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        .budget-card { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; position: relative; }
        .budget-header { display: flex; justify-content: space-between; align-items: center; }
        .budget-category { display: flex; align-items: center; gap: 0.75rem; font-weight: 600; font-size: 1.125rem; }
        .budget-icon { width: 32px; height: 32px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.875rem; }
        
        .budget-amounts { display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .budget-amounts .spent { font-weight: 600; color: var(--text-main); }
        
        .progress-wrapper { width: 100%; height: 8px; background: var(--border-color); border-radius: var(--radius-full); overflow: hidden; }
        .progress-bar { height: 100%; border-radius: var(--radius-full); transition: width 0.5s ease, background-color 0.3s ease; }
        
        .budget-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; }
        .budget-status { font-weight: 500; }
        
        .action-btns { opacity: 0; transition: var(--transition); display: flex; gap: 0.25rem; }
        .budget-card:hover .action-btns { opacity: 1; }
        @media (max-width: 768px) { .action-btns { opacity: 1; } }
        
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.25rem; }
        .btn-icon:hover { color: var(--primary); }
        .btn-icon.delete:hover { color: var(--danger); }

        /* Modal Styles */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: var(--transition); backdrop-filter: blur(4px); }
        .modal.active { opacity: 1; pointer-events: all; }
        .modal-content { background: var(--surface-solid); width: 100%; max-width: 400px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); transform: translateY(20px); transition: var(--transition); display: flex; flex-direction: column; }
        .modal.active .modal-content { transform: translateY(0); }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1.5rem; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 1rem; }
    </style>
</head>
<body>

    <div class="app-container" id="app-container">
        <main class="main-content" id="main-content">
            <div class="content-area">
                
                <div class="page-header">
                    <div>
                        <h2>Monthly Budget</h2>
                        <p class="text-muted" id="budget-month-label">Tracking spending for Current Month</p>
                    </div>
                    <button class="btn btn-primary" onclick="Budget.openForm()">
                        <i class="fa-solid fa-plus"></i> Set Budget
                    </button>
                </div>

                <div class="budget-grid" id="budget-container">
                    <!-- Populated by JS -->
                </div>

            </div>
        </main>
    </div>

    <!-- Budget Form Modal -->
    <div class="modal" id="budget-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Set Budget</h3>
                <button class="btn-icon" onclick="Modal.close('budget-modal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="budget-form">
                    <input type="hidden" id="budget-id">
                    
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select class="form-control" id="budget-category" required>
                            <!-- Populated by JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Monthly Limit</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="budget-amount" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" style="background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color);" onclick="Modal.close('budget-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="Budget.save()">Save Budget</button>
            </div>
        </div>
    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/components/sidebar.js"></script>
    <script src="assets/components/navbar.js"></script>
    <script src="assets/components/modal.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/budget.js"></script>
</body>
</html>
