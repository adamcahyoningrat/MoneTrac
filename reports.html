<!-- reports.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - MyFinance</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .header-actions { display: flex; gap: 0.5rem; }
        
        .report-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; background: var(--surface); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
        
        .chart-wrapper { background: var(--surface); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color); margin-bottom: 2rem; position: relative; height: 400px; width: 100%; display: flex; justify-content: center; align-items: center; }
        
        .table-responsive { overflow-x: auto; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
        .data-table { width: 100%; border-collapse: collapse; text-align: left; }
        .data-table th, .data-table td { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color); }
        .data-table th { background: var(--surface-solid); font-weight: 600; color: var(--text-muted); }
        .data-table tbody tr:hover { background: var(--primary-light); }
        .data-table tbody tr:last-child td { border-bottom: none; }
        
        /* Print Styles */
        @media print {
            .sidebar, .top-navbar, .page-header button, .report-controls { display: none !important; }
            .main-content { margin-left: 0; }
            .chart-wrapper, .table-responsive { box-shadow: none; border: none; }
            .chart-wrapper { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app-container">
        <main class="main-content" id="main-content">
            <div class="content-area">
                
                <div class="page-header">
                    <div>
                        <h2>Financial Reports</h2>
                        <p class="text-muted">Analyze your cash flow and spending trends.</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn" style="background: var(--surface-solid); border: 1px solid var(--border-color); color: var(--text-main);" onclick="Reports.exportCSV()">
                            <i class="fa-solid fa-download"></i> Export CSV
                        </button>
                        <button class="btn btn-primary" onclick="window.print()">
                            <i class="fa-solid fa-print"></i> Print Report
                        </button>
                    </div>
                </div>

                <div class="report-controls">
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Report Type</label>
                        <select class="form-control" id="report-type">
                            <option value="expense-category">Expense by Category</option>
                            <option value="income-category">Income by Category</option>
                            <option value="cashflow-trend">Monthly Cashflow Trend</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Time Period</label>
                        <select class="form-control" id="report-period">
                            <option value="this-month">This Month</option>
                            <option value="last-month">Last Month</option>
                            <option value="this-year">This Year</option>
                            <option value="all-time">All Time</option>
                        </select>
                    </div>
                </div>

                <div class="chart-wrapper">
                    <canvas id="reportChart"></canvas>
                </div>

                <div class="table-responsive">
                    <table class="data-table" id="report-table">
                        <thead id="report-table-head">
                            <!-- Populated by JS -->
                        </thead>
                        <tbody id="report-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/components/sidebar.js"></script>
    <script src="assets/components/navbar.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/reports.js"></script>
</body>
</html>
